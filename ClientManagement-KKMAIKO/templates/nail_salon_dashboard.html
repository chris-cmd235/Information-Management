<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KKAMAIKO — Client Management</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
    --rose: #c8737a;
    --rose-light: #fdf5f6;
    --rose-mid: #e8b4b8;
    --rose-dark: #8b3f46;
    --gold: #b8974a;
    --gold-light: #f5eedc;
    --cream: #fcfaf8; /* Lighter, cleaner cream */
    --parchment: #ffffff; /* Cleaned up */
    --ink: #1c1918;
    --ink-mid: #4a4240;
    --ink-light: #8a7f7d;
    --white: #ffffff;
    --border: rgba(42,34,32,0.06);
    --border-mid: rgba(42,34,32,0.12);
    --shadow-sm: 0 4px 16px rgba(42,34,32,0.04);
    --shadow: 0 12px 32px rgba(42,34,32,0.06);
    --shadow-lg: 0 24px 48px rgba(42,34,32,0.08);
    --radius: 20px; /* Modern large radius */
    --radius-sm: 12px;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* Glassmorphism Header */
  .header {
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: var(--shadow-sm);
    padding: 0 max(2rem, calc(50% - 600px + 2rem));
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .logo span { color: var(--rose); font-style: italic; }
  
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--border);
    border-radius: 100px;
    padding: 4px;
  }
  .tab-btn {
    background: none;
    border: none;
    padding: 8px 24px;
    border-radius: 100px;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-mid);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .tab-btn.active {
    background: var(--white);
    color: var(--ink);
    box-shadow: var(--shadow-sm);
  }
  
  /* Modernized Buttons */
  .new-btn {
    background: var(--rose);
    color: var(--white);
    border: none;
    padding: 10px 24px;
    border-radius: 100px;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 12px rgba(200, 115, 122, 0.3);
  }
  .new-btn:hover { 
    background: var(--rose-dark); 
    transform: translateY(-2px); 
    box-shadow: 0 6px 16px rgba(200, 115, 122, 0.4);
  }
  .new-btn::before { content: '+'; font-size: 20px; line-height: 1; font-weight: 400;}

  /* Main & Typography */
  .main { padding: 2.5rem 2rem; max-width: 1200px; margin: 0 auto; }
  .tab-panel { display: none; animation: fadeIn 0.4s ease; }
  .tab-panel.active { display: block; }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 2rem;
    letter-spacing: 0.01em;
  }
  .section-title em { color: var(--rose); font-style: italic; }

  /* Floating Metrics Cards */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }
  .metric-card {
    background: var(--white);
    border: none;
    box-shadow: var(--shadow-sm);
    border-radius: var(--radius);
    padding: 1.5rem 1.75rem;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }
  .metric-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow);
  }
  .metric-card.gold {
    background: var(--white);
  }
  .metric-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-light);
    margin-bottom: 12px;
  }
  .metric-value {
    font-family: var(--font-display);
    font-size: 42px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 6px;
  }
  .metric-sub { font-size: 13px; color: var(--ink-light); }

  .analytics-lower {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  @media (max-width: 700px) { .analytics-lower { grid-template-columns: 1fr; } }

  .card {
    background: var(--white);
    border: none;
    box-shadow: var(--shadow-sm);
    border-radius: var(--radius);
    padding: 1.75rem;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-light);
    margin-bottom: 1.5rem;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .design-rank, .recent-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    transition: all 0.2s;
  }
  .design-rank:last-child, .recent-item:last-child { border-bottom: none; padding-bottom: 0; }
  
  .recent-item { cursor: pointer; border-radius: var(--radius-sm); }
  .recent-item:hover { 
    background: var(--cream); 
    margin: 0 -1rem; 
    padding: 12px 1rem; 
  }

  .rank-num {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 400;
    color: var(--rose-mid);
    width: 40px;
    text-align: center;
    line-height: 1;
  }
  .rank-name { font-weight: 500; color: var(--ink); flex: 1; font-size: 15px; }
  .rank-count { font-size: 13px; font-weight: 500; color: var(--ink-light); }

  .avatar-sm {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--rose-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: var(--rose-dark);
  }
  .recent-name { font-weight: 500; font-size: 14px; flex: 1; }
  .recent-date { font-size: 12px; color: var(--ink-light); }
  .recent-badge {
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    background: var(--rose-light); color: var(--rose-dark);
    padding: 4px 10px; border-radius: 100px;
  }

  /* Soft UI Form Elements */
  .db-toolbar {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    margin-bottom: 1.5rem;
    width : 100%;
  }

  .db-toolbar .filter-select {
    width: 200px; 
    flex-shrink: 0; 
  }
  
  .search-wrap { 
    flex: 1; 
    position: relative; }

  .search-icon {
    position: absolute;
    left: 16px; top: 50%;
    transform: translateY(-50%);
    color: var(--ink-light);
    font-size: 18px;
    pointer-events: none;
  }
  .search-input, .filter-select, .form-control {
    width: 100%;
    border: 1px solid transparent;
    border-radius: 100px;
    padding: 12px 20px;
    font-family: var(--font-body);
    font-size: 14px;
    background: rgba(42,34,32,0.03);
    color: var(--ink);
    outline: none;
    transition: all 0.3s ease;
  }
  .search-input { padding-left: 44px; }

  .filter-select { 
    border: 1px solid var(--border-mid);
    border-radius: 100px;
    /* Increased right padding to 36px so long text won't touch the new arrow */
    padding: 9px 36px 9px 16px; 
    font-family: var(--font-body);
    font-size: 13px;
    background: var(--white);
    color: var(--ink);
    outline: none;
    cursor: pointer;
    /* 1. Erase the clunky, unaligned default browser arrow */
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    /* 2. Inject a clean, minimalist custom chevron centered perfectly on the line */
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%235a504e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center; /* Forces the arrow to stick to the absolute visual center */
    background-size: 12px;
  }
  .search-input:focus, .filter-select:focus, .form-control:focus { 
    background: var(--white);
    border-color: var(--rose-mid); 
    box-shadow: 0 0 0 4px var(--rose-light);
  }
  .search-input::placeholder, .form-control::placeholder { color: var(--ink-light); }

  /* Client Table Floating Style */
  .client-table-wrap { 
    background: var(--white); 
    border: none; 
    box-shadow: var(--shadow-sm); 
    border-radius: var(--radius); 
    overflow: hidden; 
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--white);
    padding: 16px 20px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-light);
    border-bottom: 2px solid var(--border);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { 
    background: var(--cream); 
  }
  tbody td { padding: 16px 20px; font-size: 14px; }
  
  .status-badge {
    display: inline-block;
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    padding: 4px 12px; border-radius: 100px;
    text-transform: uppercase;
  }
  .status-badge.active { background: #e8f5e9; color: #2e7d32; }
  .status-badge.cancelled { background: #ffebee; color: #c62828; }
  
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--ink-light); }
  .empty-state-icon { font-size: 48px; margin-bottom: 1rem; opacity: 0.3; }
  .empty-state p { font-size: 15px; }

  /* Smooth Detail Panel */
  .detail-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 560px; max-width: 100%;
    background: var(--white);
    box-shadow: var(--shadow-lg);
    z-index: 200;
    overflow-y: auto;
    border-radius: 24px 0 0 24px;
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .detail-panel.open { transform: translateX(0); }
  .detail-overlay {
    position: fixed; inset: 0;
    background: rgba(42,34,32,0.2);
    backdrop-filter: blur(4px);
    z-index: 199;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
  }
  .detail-overlay.open { opacity: 1; pointer-events: all; }

  .detail-header {
    background: var(--cream);
    padding: 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 1.25rem;
  }
  .close-btn {
    background: var(--white); 
    border: none;
    box-shadow: var(--shadow-sm);
    border-radius: 50%; width: 36px; height: 36px;
    cursor: pointer; color: var(--ink-mid);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; margin-left: auto;
    transition: all 0.2s;
  }
  .close-btn:hover { 
    background: var(--rose-light); 
    color: var(--rose-dark); 
    transform: scale(1.05);
  }
  
  .avatar-lg {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--rose-light);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 26px; font-weight: 500; color: var(--rose-dark);
  }
  .detail-name { font-family: var(--font-display); font-size: 28px; font-weight: 500; line-height: 1.2; }
  .detail-meta { font-size: 13px; color: var(--ink-light); margin-top: 4px; }

  .detail-body { padding: 2rem; }
  .detail-section { margin-bottom: 2rem; }
  .detail-section-title {
    font-size: 10px; 
    font-weight: 500; 
    text-transform: uppercase;
    letter-spacing: 0.1em; 
    color: var(--ink-light);
    /* Tweaked padding to give the new button breathable room */
    padding-bottom: 6px; 
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px; 
    /* Flex alignment handles layout balancing */
    display: flex; 
    align-items: center;
    justify-content: space-between;
    min-height: 28px; /
  }
  
  .edit-link {
    font-size: 11px; 
    font-weight: 600;
    text-transform: uppercase; 
    letter-spacing: 0.06em;
    color: var(--ink); /* Changes the text to a neutral dark color */
    background: var(--rose-light); /* Soft pink background for a friendly feel */
    border: 1px solid var(--border-mid); /* Gives it a subtle button outline */
    border-radius: 100px; /* Makes it a modern pill shape */
    padding: 6px 16px;
    cursor: pointer; 
    text-decoration: none;
    transition: all 0.2s ease;
    box-shadow: 0 2px 4px rgba(42,34,32,0.02);
  }
  
  .edit-link:hover { 
    background: var(--rose-dark); /* Fills in dark on hover */
    color: var(--white); /* Text turns white on hover */
    border-color: var(--rose-dark);
    transform: translateY(-1px); /* Slight lift effect */
    box-shadow: var(--shadow-sm);
  }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; }
  .info-field label { display: block; font-size: 11px; font-weight: 500; color: var(--ink-light); margin-bottom: 4px; }
  .info-field span { font-size: 14px; color: var(--ink); font-weight: 500; }
  
  /* Inputs in Details Panel */
  .info-field input, .info-field select { border-radius: var(--radius-sm); }

  .nail-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
    margin-bottom: 10px;
  }
  .nail-cell {
    text-align: center; background: var(--cream);
    border-radius: var(--radius-sm); padding: 12px 6px;
    border: 1px solid var(--border);
  }
  .nail-cell-label { font-size: 10px; font-weight: 600; color: var(--ink-light); margin-bottom: 6px; }
  .nail-cell-val { 
    font-size: 15px;
    font-weight: 600;
    color: var(--rose-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .visit-item {
    background: var(--white); 
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px; margin-bottom: 12px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    transition: all 0.2s;
  }
  .visit-item:hover { border-color: var(--border-mid); box-shadow: var(--shadow-sm); }
  .visit-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .visit-date { font-weight: 600; font-size: 14px; }
  .visit-toggle { font-size: 18px; color: var(--ink-light); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .visit-toggle.open { transform: rotate(180deg); }
  .visit-services { font-size: 13px; color: var(--ink-mid); }
  .visit-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border-mid); }
  .visit-detail.open { display: block; animation: fadeIn 0.3s ease; }
  .visit-design-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 10px; }
  .design-pill {
    background: var(--rose-light); color: var(--rose-dark);
    border-radius: 8px; padding: 6px;
    font-size: 11px; font-weight: 500; text-align: center; line-height: 1.4;
  }
  .design-pill label { display: block; color: var(--ink-light); font-size: 9px; font-weight: 600; text-transform: uppercase; margin-bottom: 2px;}

  /* Glassmorphism Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(42,34,32,0.3);
    backdrop-filter: blur(6px);
    z-index: 300;
    display: none;
    align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 24px;
    width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(40px) scale(0.98); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  .modal-header {
    padding: 1.75rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 26px; font-weight: 500;
    color: var(--ink);
  }
  .modal-body { padding: 2rem; }
  .modal-footer {
    padding: 1.5rem 2rem;
    border-top: 1px solid var(--border);
    background: var(--cream);
    display: flex; gap: 12px; justify-content: flex-end;
    border-radius: 0 0 24px 24px;
  }

  .step-indicator {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 2rem;
  }
  .step-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--border-mid); transition: all 0.3s;
  }
  .step-dot.active { background: var(--rose); transform: scale(1.2); }
  .step-dot.done { background: var(--rose-mid); }
  .step-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-light);
    margin-left: 6px;
  }

  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
  .choice-card {
    border: 2px solid transparent;
    background: var(--cream);
    border-radius: var(--radius);
    padding: 2rem 1.5rem;
    cursor: pointer; text-align: center;
    transition: all 0.2s ease;
  }
  .choice-card:hover { 
    border-color: var(--rose-mid); 
    background: var(--white);
    box-shadow: var(--shadow-sm);
    transform: translateY(-2px);
  }
  .choice-icon { font-size: 36px; margin-bottom: 12px; }
  .choice-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
  .choice-desc { font-size: 13px; color: var(--ink-light); }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--ink-mid); margin-bottom: 8px;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .service-list { display: flex; flex-direction: column; gap: 10px; }
  .service-option {
    display: flex; align-items: center; gap: 16px;
    border: 2px solid var(--border); 
    border-radius: var(--radius-sm);
    padding: 14px 16px; cursor: pointer; transition: all 0.2s;
    user-select: none;
  }
  .service-option:hover { border-color: var(--rose-mid); background: var(--rose-light); }
  .service-option.selected { border-color: var(--rose); background: var(--rose-light); box-shadow: 0 4px 12px rgba(200, 115, 122, 0.15);}
  .service-check {
    width: 20px; height: 20px; border-radius: 6px;
    border: 2px solid var(--border-mid);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--white);
    transition: all 0.2s;
  }
  .service-option.selected .service-check {
    background: var(--rose); border-color: var(--rose);
  }
  .service-option.selected .service-check::after { content: '✓'; }
  .service-name { flex: 1; font-weight: 500; font-size: 14px; }
  .service-price { font-weight: 600; color: var(--rose-dark); }

  /* Buttons inside Modals/Forms */
  .btn {
    border: none; border-radius: 100px; padding: 12px 24px;
    font-family: var(--font-body); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s ease; letter-spacing: 0.02em;
  }
  .btn-primary { background: var(--rose); color: var(--white); box-shadow: 0 4px 12px rgba(200, 115, 122, 0.25); }
  .btn-primary:hover { background: var(--rose-dark); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(200, 115, 122, 0.35);}
  .btn-secondary { background: var(--white); color: var(--ink-mid); border: 1px solid var(--border-mid); }
  .btn-secondary:hover { background: var(--cream); border-color: var(--ink-light); }
  .btn-danger { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
  .btn-danger:hover { background: #c62828; color: var(--white); }
  .btn-sm { padding: 8px 16px; font-size: 13px; }

  /* Pagination */
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-top: 2rem; padding: 0.5rem;
  }
  .page-btn {
    border: none; background: transparent;
    color: var(--ink-mid); border-radius: 100px; padding: 8px 14px;
    cursor: pointer; font-size: 13px; font-weight: 500; font-family: var(--font-body);
    transition: all 0.2s;
  }

<script>
//Data layer
const SERVICES = [
  { name: 'Gel X - Plain Color', price: 449 },
  { name: 'Gel X - Minimal (1-3 colors w/ design)', price: 499 },
  { name: 'Gel X - Intermediate (4-5 colors w/ design)', price: 549 },
  { name: 'Gel X - Advanced (6-10 colors w/ design)', price: 599 },
  { name: 'Gel Manicure - Regular', price: 299 },
  { name: 'BIAB Overlay Only (no design)', price: 349 },
  { name: 'BIAB Gel Manicure', price: 399 },
  { name: 'Removal (w/ new set)', price: 90 },
  { name: 'Removal (only)', price: 170 },
  { name: 'Squeeze-in fee', price: 200 }
];

const FINGERS = ['L-Thumb','L-Index','L-Middle','L-Ring','L-Pinky','R-Thumb','R-Index','R-Middle','R-Ring','R-Pinky'];
const FINGER_SHORT = ['LT','LI','LM','LR','LP','RT','RI','RM','RR','RP'];

let cachedClients = [];
let cachedVisits = []; 
let cachedDiscounts = [];

//REST API:Fetching existing values from MySQL
async function fetchDashboardData() {
    try {
        //Fetch Clients
        const clientResponse = await fetch('/api/clients');
        if (!clientResponse.ok) throw new Error('Failed to load clients');
        cachedClients = await clientResponse.json();
        renderClientTable();
        
        //Fetch Discounts
        const discountResponse = await fetch('/api/discounts');
        if (discountResponse.ok) cachedDiscounts = await discountResponse.json();
        
        //Fetch Visits (all)
        const visitsResponse = await fetch('/api/visits');
        if (visitsResponse.ok) {
            cachedVisits = await visitsResponse.json();
	    renderClientTable(); 
        } else {
            cachedVisits = [];
        }
        
        //3. Fetch Analytics
        const analyticsResponse = await fetch('/api/analytics');
        if (!analyticsResponse.ok) throw new Error('Failed to load analytics');
        const metrics = await analyticsResponse.json();
        renderAnalytics(metrics);
        
        await loadRecentVisits();
    } catch (error) {
        console.error("Data Pipeline Sync Error:", error);
    }
}
function getClients() { return cachedClients; }
function getVisits() { return cachedVisits; }

async function loadRecentVisits() {
  try {
    const response = await fetch('/api/recent-visits');
    const visits = await response.json();
    const html = visits.map(v => `
      <div class="recent-item" onclick="openClientDetail(${v.id})">
        <div class="avatar-sm">${initials(v.name)}</div>
        <div class="recent-name">${esc(v.name)}</div>
      </div>
    `).join('');
    document.getElementById('recent-visits').innerHTML = html || '<div class="visits-empty">No visits.</div>';
  } catch (err) {
    console.error("Error loading recent visits:", err);
  }
}

//REST API:POST new data fields
async function saveClients(arr) { 
    const newClient = arr[arr.length - 1]; 
    try {
        const response = await fetch('/api/clients', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newClient)
        });
        const resData = await response.json();
        if (!response.ok) throw new Error(resData.error || 'Server rejected insertion pipeline');
        console.log("Sync Success:", resData.message);
        cachedClients = arr;
    } catch (error) {
        console.error("Pipeline Break during saveClients:", error);
        showToast(`Database write dropped: ${error.message}`, 'error');
        arr.pop(); 
    }
}

//REST API:PUT edited variables
async function updateClientInDB(updatedClient) {
    try {
        const response = await fetch(`/api/clients/${updatedClient.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updatedClient)
        });
        const resData = await response.json();
        if (!response.ok) throw new Error(resData.error || 'Server rejected modification routine');
        console.log("Update Success:", resData.message);
    } catch (error) {
        console.error("Pipeline Break during updateClientInDB:", error);
        showToast(`Update dropped: ${error.message}`, 'error');
        throw error;
    }
}

async function deleteClientFromDB(clientId) {
    try {
        const response = await fetch(`/api/clients/${clientId}`, {
            method: 'DELETE'
        });
        const resData = await response.json();
        if (!response.ok) throw new Error(resData.error || 'Server rejected deletion routine');
        console.log("Delete Success:", resData.message);
    } catch (error) {
        console.error("Pipeline Break during deleteClientFromDB:", error);
        showToast(`Deletion dropped: ${error.message}`, 'error');
        throw error;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    fetchDashboardData();
});

//Ui Utilities
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast', 2800);
}

function initials(name) {
  if (!name) return '?';
  return name.trim().split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function nextClientId() {
    const clients = getClients();
    if (clients.length === 0) return 1001;      // start from 1001 if no clients exist
    const maxId = Math.max(...clients.map(c => c.id));
    return maxId + 1;
}

function validateName(name) {
  return /^[A-Za-zÀ-ÿ\s.'-]{2,100}$/.test(name);
}

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function validateSocialMedia(username) {
  return username === '' || /^[A-Za-z0-9._@]{3,50}$/.test(username);
}

function validateBirthday(dateStr) {
  if (!dateStr) return true;
  const birthday = new Date(dateStr);
  const today = new Date();
  if (birthday > today) return false;
  let age = today.getFullYear() - birthday.getFullYear();
  const monthDiff = today.getMonth() - birthday.getMonth();
  if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthday.getDate())) age--;
  return age >= 5 && age <= 120;
}


//TAB SWITCHING
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn')[tab === 'analytics' ? 0 : 1].classList.add('active');
}

//ANALYTICS
function renderAnalytics(metrics) {
  const clients = getClients();
  const now = new Date();
  const curMonth = now.getMonth();
  const curYear = now.getFullYear();

  // If metrics mapping wasn't passed down gracefully, fall back cleanly
  const monthlyRevenueValue = metrics ? metrics.monthlyRevenue : 0;
  const cancelCountValue = metrics ? metrics.cancellations : 0;
  const totalVisitsValue = metrics ? metrics.totalVisits : 0;

  document.getElementById('metrics-grid').innerHTML = `
    <div class="metric-card gold">
      <div class="metric-label">Monthly Revenue</div>
      <div class="metric-value">₱${monthlyRevenueValue.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
      <div class="metric-sub">${now.toLocaleString('en-US',{month:'long'})} ${curYear}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Cancellations</div>
      <div class="metric-value">${cancelCountValue}</div>
      <div class="metric-sub">of ${clients.length} total</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Total Visits</div>
      <div class="metric-value">${totalVisitsValue || 0}</div>
      <div class="metric-sub">all time</div>
    </div>
  `;

  // Top 3 designs handling (Update to read from backend data directly)
  const topEl = document.getElementById('top-designs');
  if (!metrics || !metrics.topDesigns || !metrics.topDesigns.length) {
    topEl.innerHTML = '<div class="visits-empty">No design data yet.</div>';
  } else {
    topEl.innerHTML = metrics.topDesigns.map((d, i) => `
      <div class="design-rank">
        <div class="rank-num">${i + 1}</div>
        <div class="rank-name">${esc(d.name)}</div>
        <div class="rank-count">${d.count}× used</div>
      </div>
    `).join('');
  }
}

//CLIENT TABLE
let currentPage = 1;
const PAGE_SIZE = 10;

function renderClientTable() {
  const q = document.getElementById('client-search').value.toLowerCase();
  const sf = document.getElementById('status-filter').value;
  let clients = getClients();

  if (q) {
    clients = clients.filter(c =>
      (c.fullName || '').toLowerCase().includes(q) ||
      String(c.id).includes(q) ||
      (c.dateRegistered || '').includes(q) ||
      (c.email || '').toLowerCase().includes(q)
    );
  }
  if (sf) clients = clients.filter(c => c.status === sf);

  const totalPages = Math.max(1, Math.ceil(clients.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = 1;
  const paged = clients.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
  const visits = getVisits();

  const tbody = document.getElementById('client-table-body');
  const empty = document.getElementById('client-empty');

  if (!clients.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = paged.map(c => {
      const vCount = visits.filter(v => v.clientId === c.id).length;
      return `<tr onclick="openClientDetail(${c.id})">
        <td><span style="font-family:var(--font-display);font-size:16px;color:var(--ink-light)">#${c.id}</span></td>
        <td><strong>${esc(c.fullName || '—')}</strong></td>
        <td>${esc(c.phone || '—')}</td>
        <td>${esc(c.email || '—')}</td>
        <td>${fmtDate(c.dateRegistered)}</td>
        <td style="text-align:center">${vCount}</td>
        <td><span class="status-badge ${c.status || 'active'}">${c.status || 'active'}</span></td>
      </tr>`;
    }).join('');
  }

  //Pagination
  const pgEl = document.getElementById('pagination');
  if (totalPages <= 1) { pgEl.innerHTML = ''; return; }
  let pgHtml = `<button class="page-btn" ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})">‹</button>`;
  for (let i = 1; i <= totalPages; i++) {
    pgHtml += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  pgHtml += `<button class="page-btn" ${currentPage===totalPages?'disabled':''} onclick="goPage(${currentPage+1})">›</button>`;
  pgEl.innerHTML = pgHtml;
}

function goPage(p) { currentPage = p; renderClientTable(); }

//CLIENT DETAIL PANEL
function openClientDetail(clientId) {
  const clients = getClients();
  const client = clients.find(c => c.id === clientId);
  if (!client) return;
  const visits = getVisits().filter(v => v.clientId === clientId).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const latestSize = getVisits().filter(v => v.clientId === clientId && v.nailSizes).sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  document.getElementById('detail-header-content').innerHTML = `
    <div class="avatar-lg">${initials(client.fullName)}</div>
    <div style="flex:1">
      <div class="detail-name">${esc(client.fullName || '—')}</div>
      <div class="detail-meta">ID #${client.id} · Registered ${fmtDate(client.dateRegistered)} · ${visits.length} visit${visits.length!==1?'s':''}</div>
    </div>
    <button class="close-btn" onclick="closeDetail()">×</button>
  `;

  let infoHtml = `
    <div class="detail-section">
      <div class="detail-section-title">Client Info <a class="edit-link" onclick="editClientInfo(${clientId})">Edit</a></div>
      <div class="info-grid">
        <div class="info-field"><label>Full Name</label><span>${esc(client.fullName||'—')}</span></div>
        <div class="info-field"><label>Phone</label><span>${esc(client.phone||'—')}</span></div>
        <div class="info-field"><label>Email</label><span>${esc(client.email||'—')}</span></div>
        <div class="info-field"><label>Social Media</label><span>${esc(client.socialMedia||'—')}</span></div>
        <div class="info-field"><label>Birthday</label><span>${fmtDate(client.birthday)}</span></div>
        <div class="info-field" style="grid-column:span 2"><label>Address</label><span>${esc(client.address||'—')}</span></div>
        <div class="info-field"><label>Favorite Music</label><span>${esc(client.favoriteMusic||'—')}</span></div>
        <div class="info-field"><label>Status</label><span><span class="status-badge ${client.status||'active'}">${client.status||'active'}</span></span></div>
      </div>
    </div>
  `;

  //Latest nail sizes
  if (latestSize && latestSize.nailSizes) {
    const ns = latestSize.nailSizes;
    infoHtml += `
      <div class="detail-section">
        <div class="detail-section-title">Latest Nail Sizes <span style="font-size:10px;font-weight:400;text-transform:none;letter-spacing:0">${fmtDate(latestSize.date)}</span></div>
        <div style="margin-bottom:4px" class="nail-hand-label">Left Hand</div>
        <div class="nail-grid">
          ${['LT','LI','LM','LR','LP'].map((k,i)=>`<div class="nail-cell"><div class="nail-cell-label">${['Thumb','Index','Middle','Ring','Pinky'][i]}</div><div class="nail-cell-val">${ns[k]||'—'}<span style="font-size:10px;color:var(--ink-light)">mm</span></div></div>`).join('')}
        </div>
        <div class="nail-hand-label">Right Hand</div>
        <div class="nail-grid">
          ${['RT','RI','RM','RR','RP'].map((k,i)=>`<div class="nail-cell"><div class="nail-cell-label">${['Thumb','Index','Middle','Ring','Pinky'][i]}</div><div class="nail-cell-val">${ns[k]||'—'}<span style="font-size:10px;color:var(--ink-light)">mm</span></div></div>`).join('')}
        </div>
      </div>
    `;
  }

  //Visit history
  infoHtml += `<div class="detail-section"><div class="detail-section-title">Visit History</div>`;
  if (!visits.length) {
    infoHtml += `<div class="visits-empty">No visits recorded yet.</div>`;
  } else {
    infoHtml += visits.map((v, idx) => {
      const services = (v.services||[]).map(s=>`${s.name} (₱${s.price})`).join(', ');
      const total = (v.services||[]).reduce((acc,s)=>acc+(s.price||0),0);
      let designHtml = '';
      if (v.designs) {
        if (v.designs.all) {
          designHtml = `<div style="margin-top:6px"><span style="font-size:11px;color:var(--ink-light)">Design (all nails): </span><span style="font-size:12px;font-weight:500;color:var(--rose-dark)">${esc(v.designs.all)}</span></div>`;
        } else {
          designHtml = `<div class="visit-design-grid">
            ${FINGER_SHORT.map((k,i)=>`<div class="design-pill"><label>${k}</label>${esc(v.designs[k]||'—')}</div>`).join('')}
          </div>`;
        }
      }
      return `<div class="visit-item">
        <div class="visit-item-header" onclick="toggleVisit(this)">
          <div>
            <div class="visit-date">${fmtDate(v.date)}</div>
            <div class="visit-services" style="font-size:11px;color:var(--ink-light)">${(v.services||[]).map(s=>s.name).join(', ')||'No services'}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-weight:500;color:var(--rose-dark);font-size:13px">₱${total}</span>
            <span class="visit-toggle">⌄</span>
          </div>
        </div>
        <div class="visit-detail">
          <div style="font-size:12px;color:var(--ink-mid);margin-bottom:6px">${services}</div>
          ${designHtml}
        </div>
      </div>`;
    }).join('');
  }
  infoHtml += `</div>`;

  infoHtml += `
    <div class="detail-section">
      <div class="detail-section-title">Account</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="toggleStatus(${clientId})">${client.status==='cancelled'?'Restore Client':'Mark as Cancelled'}</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete(${clientId})">Delete Client</button>
      </div>
    </div>
  `;

  document.getElementById('detail-body-content').innerHTML = infoHtml;
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-overlay').classList.add('open');
}

function calcAge(bday) {
  const b = new Date(bday + 'T00:00:00');
  const n = new Date();
  let age = n.getFullYear() - b.getFullYear();
  const m = n.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && n.getDate() < b.getDate())) age--;
  return age;
}

async function toggleStatus(clientId) {
    try {
        const response = await fetch(`/api/clients/${clientId}/toggle-status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' }
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error);
        
        showToast(data.message, 'success');
        
        // Refresh everything from the server
        await fetchDashboardData();
        
        // If the detail panel is open, refresh it
        if (document.getElementById('detail-panel').classList.contains('open')) {
            openClientDetail(clientId);
        }
        renderClientTable();
    } catch (error) {
        console.error("Toggle status error:", error);
        showToast(`Error: ${error.message}`, 'error');
    }
}

async function deleteClient(clientId) {
  try {
    //1.Tell the database to delete the record
    await deleteClientFromDB(clientId);
    
    //2.Fetch the fresh, updated list from the server
    await fetchDashboardData();
    
    //3.Clean up the UI
    closeModal(); 
    closeDetail();
    showToast('Client permanently deleted.', 'success');
  } catch (error) {
    console.log("UI updates halted. Client could not be deleted.");
  }
}

async function saveNewClientAndNext() {
    const name = document.getElementById('nc-name').value.trim();
    if (!name) { 
        showToast('Full name is required.', 'error'); 
        return; 
    }
    
    // 1. Check for duplicate name (case‑insensitive)
    const existingClient = cachedClients.find(c => 
        c.fullName && c.fullName.toLowerCase() === name.toLowerCase()
    );
    
    if (existingClient) {
        // Duplicate found: ask user what to do
        const useExisting = confirm(
            `A client named "${existingClient.fullName}" (ID #${existingClient.id}) already exists.\n\n` +
            `Do you want to add a new appointment for this existing client?\n` +
            `Click OK to proceed with the existing client, or Cancel to go back and change the name.`
        );
        
        if (useExisting) {
            // Use existing client – skip creating a new client
            flowData.isNew = false;
            flowData.clientId = existingClient.id;
            showToast(`Using existing client: ${existingClient.fullName}`, 'success');
            showServiceSelection();  // proceed to services, nail sizes, design, etc.
        } else {
            // User wants to change the name – just close the modal (they can reopen)
            closeModal();
            showToast('Please change the client name and try again.', 'info');
        }
        return;
    }
    
    // 2. No duplicate – create a new client (original logic)
    const newId = nextClientId();  // generate a new ID
    flowData.isNew = true;
    flowData.clientId = newId;
    
    const newClient = {
        id: newId,
        fullName: name,
        phone: document.getElementById('nc-phone').value.trim(),
        email: document.getElementById('nc-email').value.trim(),
        socialMedia: document.getElementById('nc-social').value.trim(),
        birthday: document.getElementById('nc-bday').value || null,
        address: document.getElementById('nc-addr').value.trim(),
        favoriteMusic: document.getElementById('nc-music').value.trim(),
        dateRegistered: today(),
        status: 'active'
    };
    
    const clients = getClients();
    clients.push(newClient);
    
    await saveClients(clients);
    
    if (clients.includes(newClient)) {
        showServiceSelection();
    }
}

function toggleService(idx) {
  const el = document.getElementById(`svc-${idx}`);
  const sel = flowData.selectedServices;
  const i = sel.findIndex(s => s.name === SERVICES[idx].name);
  if (i >= 0) {
    sel.splice(i, 1);
    el.classList.remove('selected');
  } else {
    sel.push({ ...SERVICES[idx] });
    el.classList.add('selected');
  }
  updateServiceTotal();
}

function updateServiceTotal() {
  const sel = flowData.selectedServices || [];
  const baseTotal = sel.reduce((acc, s) => acc + s.price, 0);
  
  const discountSelect = document.getElementById('svc-discount');
  let discountPercent = 0;
  flowData.discountId = null;
  
  // Calculate discount dynamically
  if (discountSelect && discountSelect.value) {
      flowData.discountId = parseInt(discountSelect.value);
      const discountData = cachedDiscounts.find(d => d.Discount_ID === flowData.discountId);
      if (discountData) {
          discountPercent = parseFloat(discountData.Discount_Value) || 0;
      }
  }
  
  const discountAmount = baseTotal * (discountPercent / 100);
  const finalTotal = baseTotal - discountAmount;
  
  document.getElementById('svc-total').innerHTML = `
      <div style="font-size: 12px; color: var(--ink-mid);">Base: ₱${baseTotal.toFixed(2)}</div>
      <div style="font-size: 12px; color: var(--rose-dark);">Discount: -₱${discountAmount.toFixed(2)}</div>
      <div style="font-size: 15px; font-weight: bold; color: var(--ink);">Total: ₱${finalTotal.toFixed(2)}</div>
  `;
}

async function saveVisitAndFinish() {
  let designs = {};
  
  const el = document.getElementById('design-all-input');
  if (el) {
    const v = el.value.trim();
    if (v) designs.all = v;
  }
  flowData.designs = designs;

  const visit = {
    clientId: typeof flowData.clientId === 'object' && flowData.clientId !== null ? flowData.clientId.id : flowData.clientId,
    
    date: new Date().toISOString().split('T')[0], 
    
    services: (flowData.selectedServices || []).map(s => typeof s === 'object' ? s.name : s),
    
    nailSizes: flowData.nailSizes || {},
    designs: flowData.designs || {},
    discountId: flowData.discountId || null,
    
    //Attach the processed Base64 image
    imageBase64: flowData.imageBase64 || null 
  };

  //3. PRE-FLIGHT CHECK
  if (!visit.clientId) {
      showToast('Error: No client selected!', 'error');
      console.error("Pre-flight Error: clientId is missing from flowData");
      return;
  }

  try {
    const response = await fetch('/api/visits', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(visit)
    });
    
    //4. ERROR CATCHING
    if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.error || 'Server rejected the save request');
    }
    
    await fetchDashboardData(); 
    
    closeModal();
    showToast('Visit saved successfully!', 'success');
    
    setTimeout(() => openClientDetail(flowData.clientId), 400);
    
  } catch (error) {
    console.error("Database Save Error:", error);
    showToast(`Error: ${error.message}`, 'error');
  }
}

function stepIndicator(current) {
  const steps = ['Client', 'Services', 'Nail Sizes', 'Design'];
  const dots = steps.map((s, i) => `<div class="step-dot ${i < current ? 'done' : i === current ? 'active' : ''}"></div>`).join('');
  return `<div class="step-indicator">${dots}<span class="step-label">${steps[current]}</span></div>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
